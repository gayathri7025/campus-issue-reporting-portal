<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Portal</title>
    <style>
        /* MODERN CSS STYLING */
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #64748b;
            --background: #f1f5f9;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        a { text-decoration: none; color: inherit; }

        /* HEADER */
        header { background-color: var(--surface); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .logo { font-size: 1.25rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .nav-links a { color: var(--text-muted); margin-left: 20px; font-weight: 500; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* MAIN LAYOUT */
        main { flex: 1; padding: 2rem; max-width: 1200px; width: 100%; margin: 0 auto; }

        /* COMPONENTS */
        .btn { cursor: pointer; border: none; border-radius: var(--radius); padding: 0.75rem 1.5rem; font-size: 0.95rem; font-weight: 600; text-decoration: none; display: inline-block; transition: 0.2s; text-align: center; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-dark); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-main); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); padding: 1.5rem; border-radius: var(--radius); box-shadow: var(--shadow); border-left: 4px solid var(--primary); }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--text-main); }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; }

        .issue-list { display: grid; gap: 1rem; }
        .issue-card { background: var(--surface); padding: 1.5rem; border-radius: var(--radius); box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; }
        .issue-info h3 { margin-bottom: 0.5rem; font-size: 1.1rem; }
        .issue-meta { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 1rem; }

        .status-badge { padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-Pending { background-color: #fef3c7; color: #d97706; }
        .status-InProgress { background-color: #e0f2fe; color: #0284c7; }
        .status-Resolved { background-color: #dcfce7; color: #16a34a; }

        .form-container { background: var(--surface); padding: 2rem; border-radius: var(--radius); box-shadow: var(--shadow); max-width: 800px; margin: 0 auto; }
        input, textarea, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; font-size: 1rem; }
        input:focus, textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }

        /* UTILITIES */
        .flex { display: flex; }
        .gap-4 { gap: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .text-right { text-align: right; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span>🏫</span> CampusReport
        </div>
        <nav class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'create_issue' %}">Report Issue</a>
                <span style="color:var(--text-muted)">|</span>
                <a href="{% url 'logout' %}">Logout ({{ user.username }})</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" style="color: var(--primary); font-weight: bold;">Register</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
