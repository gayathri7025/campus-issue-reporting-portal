{% extends 'core/base.html' %}

{% block content %}
    <div class="form-container" style="max-width: 400px; margin: 4rem auto;">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Create Account</h2>

        <form method="post">
            {% csrf_token %}

            <label style="font-weight: 600;">Username</label>
            {{ form.username }}
            <small style="color: var(--text-muted);">Use your Roll No or Staff ID</small>

            <label style="font-weight: 600; margin-top: 1rem; display:block;">Password</label>
            {{ form.password1 }}

            <label style="font-weight: 600;">Confirm Password</label>
            {{ form.password2 }}

            <button type="submit" class="btn btn-primary w-full" style="width: 100%; margin-top: 1rem;">Sign Up</button>
        </form>

        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--primary);">Login here</a>.
        </p>
    </div>
{% endblock %}
